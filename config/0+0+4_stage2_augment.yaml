defaults:
  - basic

project_name: "stream_wm"
notes: "Curriculum Stage 2: Robustness training with augmentation (10k+ steps, augmentation enabled)"
experiment_name: 0+0+4_stage2
scenario_name: "None"
seed: 3407

embedder: demucs_temp
detector: seanet_detector

dataset:
  dataset_name: "LibriSpeech"
  path:
    raw_path: "./dataset/LibriSpeech"
  audio:
    max_len: 60000

model:
  temp_msg_dimension:
    demucs: 128
  demucs_temp:
    chin_wav: 1
    chin_wm: 128
    depth: 5
  seanet_detector:
    n_residual_layers: 3

path:
  wm_speech: ./outputs/wav/${experiment_name}
  ckpt: ./outputs/ckpt/${experiment_name}
  log_dir: outputs/logs/${experiment_name}

# Load checkpoint from stage 1
init_from_ckpt: false
continue_from_ckpt: false  # Set this to the stage 1 checkpoint path after stage 1 completes

augmentation:
  select_aug_mode: "weighted"
  # Stage 2: Enable augmentation after initial watermark embedding
  aug_starts_from: 0  # Enable augmentation from start of stage 2

  aug_weights:
    speed: 0
    updownresample: 0.2
    quantize_audio: 0
    echo: 0
    pink_noise: 0.2
    lowpass_filter: 0.2
    random_noise: 0.4
    highpass_filter: 0.2
    bandpass_filter: 0.2
    smooth: 0.2
    boost_audio: 0.2
    duck_audio: 0.2
    mp3_compression: 0.2
    aac_compression: 0.2
    encodec: 0
    identity: 0

wm_msg:
  fix:
    length: 0
  temp:
    length: 0
    interval: 2000 #32bps
    interval_range: False
  val:
    length: 4
    d_min: 512
    d_max: 2064
    increment: 32
    interval: 512
    interval_range: [1,2]

# Stage 2: Progressive perceptual loss increase, enable tampering robustness
optimize:
  fix_layers: False
  batch_size: 6
  lr: 0.0001
  lambda_wav: 1         # Increase audio quality loss
  lambda_loud: 400      # Moderate loudness constraint
  lambda_msmel: 1       # Normal mel-spectrogram loss
  lambda_wav2vec: 75    # PROGRESSIVE perceptual loss increase
  lambda_wm_det: 50
  lambda_wm_rec_fix: 0
  lambda_wm_rec_temp: 0
  lambda_wm_rec_val: 100
  lambda_boundary_rec: 1000  # Enable boundary detection
  lambda_adv_g: 0
  lambda_adv_g_map: 0
  lambda_adv_d: 0

crop:
  prob: 0.3
  shuffle_prob: 0
  pad_prob: 0.2
  insert_prob: 0.5
  insert_size: [8000, 16000]
  clip_starts_from: 0   # Enable tampering augmentation from start of stage 2
  clip_size: 0.1
  size: 0.5
  max_n_windows: 3

iter:
  finetune_epoch: 20
  max_epoch: 100        # Stage 2: ~100k steps for robustness training
  save_sample_by_step: 100
  wandb_log_by_step: 1
  steps_per_epoch: 1000
  save_skpt_by_epoch: 1
  eval_by_epoch: 1
